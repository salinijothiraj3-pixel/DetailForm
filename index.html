<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

</head>
<body>
    <form>
    <fieldset>
        <legend>Your Details</legend>
        <label>1.Name</label> 
        <input type="text" placeholder="First and last name"><br></br>
        <label>2.Email</label>
        <input type="text" placeholder="example@domain.com"><br></br>
        <label>3.Phone</label>
        <input type="tel" placeholder="Eg.+441236578">
    </fieldset>
    <fieldset>
        <legend>Delivery Address</legend>
        <label>1.Address</label>
        <textarea></textarea><br></br>
        <label>2.Post code</label>
        <input type="post code"><br></br>
        <label>3.Country</label>
        <input type="country"><br></br>
     </fieldset>
     <fieldset>
        <legend>Card Details</legend>
        <label>1.</label> <fieldset>
            <legend>card Type</legend>
            <label>1.</label> 
            <input type="radio" name="card">
            <label>VISA</label> <br></br>
            <label>2.</label> 
            <input type="radio" name="card">
            <label>AmEx</label> <br></br>
            <label>3.</label>
            <input type="radio" name="card">
            <label>Mastercard</label> <br></br>
        </fieldset>
        <label>2. Card Number</label>
        <input type="cardnumber"><br></br>
        <label>Security code</label>
        <input type="security code"><br></br>
        <label>Name on card</label>
        <input type="name" placeholder="Exact name as on the card"><br></br>
     </fieldset>
     <fieldset>
        <button>Buy it</button>
     </fieldset>

  </form>
</body>
</html>
